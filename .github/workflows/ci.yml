# =============================================================================
# ci.yml — 지속적 통합(CI): 코드가 푸시/PR 될 때마다 자동으로 품질 검사
# =============================================================================
# 무엇을 하나:
#   - 파이썬(api, worker): uv 로 의존성 설치 → ruff 린트 → pytest 테스트
#   - 노드(web): npm 으로 설치 → 빌드 → vitest 테스트
# 언제 도나:
#   - main 으로 push, 또는 PR 이 열릴 때.
# 목적: 깨진 코드가 main 에 합쳐지지 못하게 막는 "게이트".
# =============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # 파이썬 서비스 검사 (api, worker 를 매트릭스로 병렬 실행)
  # ---------------------------------------------------------------------------
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # 한 서비스가 실패해도 다른 서비스 검사는 계속
      matrix:
        # uv workspace 의 패키지 이름 + 테스트 경로. 둘을 각각 검사한다.
        # path 를 pytest 에 명시하지 않으면 rootdir 판별이 흔들려 api/worker 양쪽
        # tests/conftest.py 이름 충돌(ImportPathMismatchError)이 난다.
        include:
          - service: contest-helper-api
            path: services/api
          - service: contest-helper-worker
            path: services/worker
    steps:
      - uses: actions/checkout@v4

      # uv 설치(공식 액션). 캐시도 자동으로 다뤄준다.
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      # 개발 의존성 포함 설치(테스트/린트 도구 필요).
      # --all-packages 필수: 워크스페이스 루트 프로젝트 자체엔 의존성이 없어서,
      # 이거 없이 `uv sync --dev` 만 돌리면 api/worker 의 dev 그룹(ruff, pytest 등)이
      # 설치되지 않고 "Checked" 로 조용히 스킵된다(그 뒤 `uv run ruff` 가 program not found).
      - name: Sync dependencies
        run: uv sync --dev --all-packages

      # ruff 린트 — 레포 전체 검사(루트 pyproject 의 ruff 설정 사용).
      - name: Lint (ruff)
        run: uv run ruff check .

      # 해당 서비스의 테스트만 실행.
      - name: Test (pytest)
        run: uv run --package ${{ matrix.service }} pytest ${{ matrix.path }}/tests

  # ---------------------------------------------------------------------------
  # 프론트엔드(web) 검사
  # ---------------------------------------------------------------------------
  web:
    runs-on: ubuntu-latest
    # services/web 이 아직 없으면 이 잡은 스킵된다(파일 존재 가드).
    steps:
      - uses: actions/checkout@v4

      - name: Check web exists
        id: web_check
        run: |
          if [ -f services/web/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "services/web/package.json 없음 → web 잡 스킵"
          fi

      - name: Check test script exists
        id: test_check
        if: steps.web_check.outputs.exists == 'true'
        working-directory: services/web
        run: |
          if grep -q '"test":' package.json; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "package.json 에 \"test\" 스크립트 없음 → vitest 단계 스킵(프론트엔드 테스트 아직 미작성)"
          fi

      - name: Set up Node 20
        if: steps.web_check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/web/package-lock.json

      - name: Install deps
        if: steps.web_check.outputs.exists == 'true'
        working-directory: services/web
        run: npm ci

      - name: Build
        if: steps.web_check.outputs.exists == 'true'
        working-directory: services/web
        run: npm run build

      - name: Test (vitest)
        if: steps.web_check.outputs.exists == 'true' && steps.test_check.outputs.exists == 'true'
        working-directory: services/web
        # --run: watch 모드 없이 1회 실행.
        run: npm run test -- --run
