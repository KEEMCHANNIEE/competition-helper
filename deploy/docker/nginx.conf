# =============================================================================
# nginx.conf — web 컨테이너(정적 SPA) 서버 설정
# =============================================================================
# 핵심 2가지:
#   1) SPA fallback : React 라우터(클라이언트 라우팅)는 /login, /recommend 같은
#      경로를 자바스크립트로 처리한다. 사용자가 그 주소에서 새로고침하면
#      서버에는 실제 파일이 없어 404 가 난다. → try_files 로 항상 index.html 을
#      돌려주어 라우팅을 React 에게 넘긴다.
#   2) /api 프록시(선택) : 같은 도메인에서 백엔드를 호출하고 싶을 때 사용.
#      (쿠버네티스에서는 보통 Ingress 가 /api 라우팅을 담당하므로 주석으로 둠)
# =============================================================================

server {
    listen 80;
    server_name _;  # 모든 호스트네임 수용

    # 정적 파일 루트(web.Dockerfile 에서 dist 를 여기로 복사함)
    root /usr/share/nginx/html;
    index index.html;

    # ----- SPA fallback -----
    # 요청 경로에 해당하는 파일이 있으면 그대로, 없으면 index.html 로.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ----- 정적 자산 캐싱(성능) -----
    # 해시가 붙은 JS/CSS 는 오래 캐시해도 안전.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ----- (선택) 백엔드 API 리버스 프록시 -----
    # 프론트와 api 를 같은 도메인으로 묶고 싶으면 아래 주석을 풀고
    # proxy_pass 의 호스트(keenee-api)를 환경에 맞게 바꾼다.
    # location /api/ {
    #     proxy_pass http://keenee-api:8000/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }
}
