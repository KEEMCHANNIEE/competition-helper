# =============================================================================
# secret.yaml — 민감한 환경변수 묶음 (DB URL, API 키, OAuth 시크릿 등)
# =============================================================================
# Secret 은 ConfigMap 과 거의 같지만 "민감값"을 담는다(base64 로 저장).
# ★ 중요: base64 는 암호화가 아니라 인코딩일 뿐이다 ★
#   진짜 보안은 (1) git 에 평문/이 파일 값 커밋 금지,
#            (2) 운영에서는 Sealed Secrets / External Secrets / KMS 사용.
#
# 이 템플릿은 values.secret 의 값을 받아 Secret 을 만든다. 하지만 values.yaml 의
# 기본값은 전부 비어 있어야 하며, 실제 값은 설치 시 주입한다:
#   helm install contest-helper . --set secret.geminiApiKey=$GEMINI_API_KEY ...
#
# secret.create=false 로 두면 이 리소스를 만들지 않는다 → 외부에서 만든
# 동일 이름의 Secret(예: External Secrets Operator 산출물)을 그대로 사용.
# =============================================================================
{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "contest-helper.secretName" . }}
  labels:
    {{- include "contest-helper.labels" . | nindent 4 }}
type: Opaque
# stringData: 평문으로 적으면 k8s 가 알아서 base64 인코딩해준다(우리가 인코딩 안 해도 됨).
stringData:
  # api/worker 가 읽는 환경변수 이름 = 키. (contest_helper_core.config 의 필드명과 매칭)
  APP_DB_URL: {{ .Values.secret.appDbUrl | quote }}
  COMPETITION_DB_URL: {{ .Values.secret.competitionDbUrl | quote }}
  GEMINI_API_KEY: {{ .Values.secret.geminiApiKey | quote }}
  GOOGLE_OAUTH_CLIENT_ID: {{ .Values.secret.googleOauthClientId | quote }}
  GOOGLE_OAUTH_CLIENT_SECRET: {{ .Values.secret.googleOauthClientSecret | quote }}
  SESSION_SECRET: {{ .Values.secret.sessionSecret | quote }}
  LANGFUSE_PUBLIC_KEY: {{ .Values.secret.langfusePublicKey | quote }}
  LANGFUSE_SECRET_KEY: {{ .Values.secret.langfuseSecretKey | quote }}
{{- end }}
