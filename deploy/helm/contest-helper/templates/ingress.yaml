# =============================================================================
# ingress.yaml — 외부 트래픽을 클러스터 안 서비스로 라우팅하는 입구
# =============================================================================
# Ingress 란? 하나의 도메인/IP 로 들어온 HTTP 요청을 경로(path)에 따라
# 서로 다른 Service 로 나눠 보내는 "L7 라우터"다.
#   - /api  → api 서비스(FastAPI, 8000)
#   - /     → web 서비스(nginx, 80)
# 동작하려면 클러스터에 Ingress 컨트롤러(ingress-nginx 등)가 설치돼 있어야 한다.
# (kind 에서는 별도 설치 필요 — README 참고)
#
# 테스트: /etc/hosts 에 "127.0.0.1 contest-helper.local" 추가 후 브라우저로 접속.
# =============================================================================
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "contest-helper.fullname" . }}
  labels:
    {{- include "contest-helper.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: conmate-xyz-tls
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "contest-helper.fullname" . }}-api
                port:
                  number: {{ .Values.service.api.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "contest-helper.fullname" . }}-web
                port:
                  number: {{ .Values.service.web.port }}
{{- end }}