# =============================================================================
# api-service.yaml — api Pod 들 앞에 두는 고정 진입점(Service)
# =============================================================================
# Pod 는 죽고 다시 뜨면 IP 가 바뀐다. Service 는 변하지 않는 이름/가상 IP 를 주어
# "이 라벨을 가진 Pod 들에게 트래픽을 분배"한다.
# 여기서는 ClusterIP(클러스터 내부 전용) — 외부 노출은 Ingress 가 담당한다.
# 다른 Pod 나 Ingress 는 "<릴리스>-contest-helper-api:8000" 으로 api 에 접속한다.
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: {{ include "contest-helper.fullname" . }}-api
  labels:
    {{- include "contest-helper.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.service.api.type }}
  selector:
    # 이 라벨을 가진 Pod(=api Deployment 의 Pod)로 트래픽 전달.
    {{- include "contest-helper.selectorLabels" (dict "ctx" . "component" "api") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.api.port }}  # 서비스가 노출하는 포트
      targetPort: http                      # Pod 컨테이너의 포트(이름 http = 8000)
