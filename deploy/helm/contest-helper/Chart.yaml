# =============================================================================
# Chart.yaml — Helm 차트의 "신분증"(메타데이터)
# =============================================================================
# Helm 이란? 쿠버네티스(k8s) 매니페스트(YAML 더미)를 "템플릿 + 값(values)"으로
# 묶어 한 번에 설치/업그레이드/삭제하게 해주는 패키지 매니저다.
# 이 차트(contest-helper)는 api/worker/web + redis 를 한 묶음으로 배포한다.
#
# 주요 필드:
#   apiVersion: v2  → Helm 3 차트 형식
#   type: application → (라이브러리가 아닌) 실제 배포용 차트
#   version     → 차트 자체의 버전(템플릿이 바뀌면 올린다)
#   appVersion  → 배포하는 앱(contest-helper)의 버전(이미지 태그와 무관해도 됨)
# =============================================================================
apiVersion: v2
name: contest-helper
description: contest-helper 공모전 추천 에이전트 (api + worker + web + redis) Helm 차트
type: application
version: 0.1.0
appVersion: "0.0.0"
