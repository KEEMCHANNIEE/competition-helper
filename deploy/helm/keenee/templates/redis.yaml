# =============================================================================
# redis.yaml — 개발/kind 용 단일 Redis (Deployment + Service)
# =============================================================================
# 학습/로컬(kind) 환경에서 쓸 "가벼운" Redis 한 대를 띄운다.
# ★ 운영(GKE)에서는 이걸 끄고(redis.enabled=false) Memorystore 같은
#   관리형 Redis 를 쓰는 게 좋다(영속성/HA/백업 때문).
# 데이터가 사라져도 큐는 재생성 가능하므로 여기선 볼륨 없이 단순하게 둔다.
#
# api/worker 는 ConfigMap 의 REDIS_URL=redis://<릴리스>-redis:6379/0 으로 접속.
# (아래 Service 이름이 "<릴리스>-redis" 와 일치해야 함)
# =============================================================================
{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-redis
  labels:
    {{- include "keenee.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "keenee.selectorLabels" (dict "ctx" . "component" "redis") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "keenee.selectorLabels" (dict "ctx" . "component" "redis") | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image | quote }}
          ports:
            - name: redis
              containerPort: 6379
          # redis-cli ping → PONG 이면 정상.
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources.redis | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  # ★ 이름이 정확히 "<릴리스>-redis" 여야 REDIS_URL 과 맞는다 ★
  name: {{ .Release.Name }}-redis
  labels:
    {{- include "keenee.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  selector:
    {{- include "keenee.selectorLabels" (dict "ctx" . "component" "redis") | nindent 4 }}
  ports:
    - name: redis
      port: 6379
      targetPort: redis
{{- end }}
